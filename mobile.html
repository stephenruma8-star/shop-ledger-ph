<!DOCTYPE html>
<html lang="en-PH">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#3b82f6" />
<title>Shop Ledger PH Mobile</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6}</style>
</head>
<body class="min-h-screen">
<header class="bg-blue-600 text-white px-4 py-3 sticky top-0 z-10 shadow-md">
  <div class="flex items-center justify-between">
    <h1 class="text-lg font-bold">🏪 Shop Ledger PH</h1>
    <span id="conn-status" class="text-xs bg-white/20 px-2 py-0.5 rounded-full">● Connected</span>
  </div>
</header>
<main id="view" class="p-4 pb-24"></main>
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex shadow-lg z-10">
  <button onclick="showView('home')" class="flex-1 py-3 text-center text-xs"><div class="text-xl">🏠</div>Home</button>
  <button onclick="showView('clients')" class="flex-1 py-3 text-center text-xs"><div class="text-xl">👥</div>Clients</button>
  <button onclick="showView('sale')" class="flex-1 py-3 text-center text-xs"><div class="text-xl">🛒</div>Sale</button>
  <button onclick="showView('pay')" class="flex-1 py-3 text-center text-xs bg-blue-50 text-blue-600 rounded-t-xl"><div class="text-xl bg-blue-600 text-white w-10 h-10 rounded-full mx-auto -mt-6 flex items-center justify-center shadow-lg">💵</div>Bayad</button>
</nav>

<script>
const API = window.location.origin;
const peso = (n) => '₱' + (Number(n) || 0).toLocaleString('en-PH', { minimumFractionDigits: 2 });
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
let state = { clients: [] };

async function loadClients() {
  try { const r = await fetch(API + '/api/clients', { headers: { 'X-Auth-Token': getToken() } }); state.clients = await r.json(); }
  catch (e) { document.getElementById('conn-status').textContent = '⚠ Error'; }
}

function getToken() {
  const m = window.location.search.match(/token=([^&]+)/);
  return m ? m[1] : '';
}

function showView(view, data) {
  const v = document.getElementById('view');
  if (view === 'home') renderHome(v);
  else if (view === 'clients') renderClients(v);
  else if (view === 'sale') renderSale(v);
  else if (view === 'pay') renderPay(v, data);
}

let saleItems = [];

function renderSale(root) {
  loadClients().then(() => {
    root.innerHTML = `
      <h2 class="text-xl font-bold mb-3">🛒 Add Sale</h2>
      <div class="bg-white p-4 rounded-xl shadow-sm space-y-3">
        <select id="sale-client" class="w-full px-3 py-3 border rounded-lg">
          <option value="">Walk-in (no client)</option>
          ${state.clients.map(c => '<option value="' + c.id + '">' + esc(c.name) + ' - ' + peso(c.balance) + '</option>').join('')}
        </select>
        <div class="flex gap-2">
          <input id="sale-item-name" type="text" placeholder="Item name" class="flex-1 px-3 py-2 border rounded-lg" />
          <input id="sale-item-qty" type="number" value="1" min="1" class="w-16 px-2 py-2 border rounded-lg text-center" />
          <input id="sale-item-cost" type="number" step="0.01" placeholder="Price" class="w-24 px-3 py-2 border rounded-lg" />
          <button onclick="addSaleItem()" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm">+</button>
        </div>
        <div id="sale-items-list" class="space-y-1"></div>
        <div class="text-right text-sm font-bold">Total: <span id="sale-total">₱0.00</span></div>
        <div class="grid grid-cols-2 gap-2">
          <select id="sale-payment" class="px-3 py-3 border rounded-lg"><option>Cash</option><option>GCash</option><option>Maya</option><option>Bank Transfer</option><option>Installment</option></select>
          <select id="sale-client-charge" class="px-3 py-3 border rounded-lg"><option value="no">No charge</option><option value="yes">Charge to client</option></select>
        </div>
        <button onclick="submitSale()" class="w-full py-4 bg-blue-500 text-white rounded-xl font-bold text-lg">✓ Save Sale</button>
      </div>`;
  });
}

function addSaleItem() {
  const name = document.getElementById('sale-item-name').value.trim();
  const qty = parseInt(document.getElementById('sale-item-qty').value) || 1;
  const unitCost = parseFloat(document.getElementById('sale-item-cost').value);
  if (!name || !unitCost) return alert('Enter item name and price');
  saleItems.push({ name, qty, unitCost, intRate: 0, invId: null });
  document.getElementById('sale-item-name').value = '';
  document.getElementById('sale-item-cost').value = '';
  document.getElementById('sale-item-qty').value = '1';
  renderSaleItems();
}

function renderSaleItems() {
  const list = document.getElementById('sale-items-list');
  const total = saleItems.reduce((s, i) => s + (i.qty * i.unitCost), 0);
  list.innerHTML = saleItems.map((i, idx) =>
    '<div class="flex justify-between items-center text-sm py-1 border-b"><span>' + esc(i.name) + ' x' + i.qty + '</span><span>' + peso(i.qty * i.unitCost) + ' <button onclick="saleItems.splice(' + idx + ',1);renderSaleItems()" class="text-red-500 ml-2">&times;</button></span></div>'
  ).join('');
  document.getElementById('sale-total').textContent = peso(total);
}

async function submitSale() {
  const clientId = parseInt(document.getElementById('sale-client').value) || null;
  const paymentMethod = document.getElementById('sale-payment').value;
  const chargeClient = document.getElementById('sale-client-charge').value === 'yes';
  if (!saleItems.length) return alert('Add at least one item');
  if (chargeClient && !clientId) return alert('Select a client to charge');
  const postItems = saleItems.map(i => ({ ...i }));
  try {
    const r = await fetch(API + '/api/sales', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Auth-Token': getToken() },
      body: JSON.stringify({ clientId: chargeClient ? clientId : null, items: postItems, paymentMethod, discount: 0, taxRate: 0 })
    });
    const result = await r.json();
    if (result.success) { alert('✅ Sale recorded! Invoice: ' + result.invoiceNo); saleItems = []; showView('home'); }
    else alert('Error: ' + result.error);
  } catch (e) { alert('Network error'); }
}

async function renderHome(root) {
  await loadClients();
  const total = state.clients.reduce((s, c) => s + (c.balance || 0), 0);
  root.innerHTML = `
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-white p-4 rounded-xl shadow-sm text-center"><div class="text-2xl font-bold text-blue-600">${state.clients.length}</div><div class="text-xs text-gray-500">Clients</div></div>
      <div class="bg-white p-4 rounded-xl shadow-sm text-center"><div class="text-2xl font-bold text-orange-600">${peso(total)}</div><div class="text-xs text-gray-500">Total Utang</div></div>
    </div>
    <h2 class="font-bold text-lg mb-2">Top Utang</h2>
    <div class="space-y-2">
      ${state.clients.filter(c => c.balance > 0).sort((a, b) => b.balance - a.balance).slice(0, 10).map(c => `
        <div class="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center">
          <div><div class="font-semibold">${esc(c.name)}</div><div class="text-xs text-gray-500">${esc(c.phone || '')}</div></div>
          <div class="text-right"><div class="font-bold text-orange-600">${peso(c.balance)}</div>
          <button onclick="showView('pay', ${c.id})" class="text-xs text-blue-600">💵 Bayad</button></div>
        </div>`).join('') || '<p class="text-gray-500 text-center py-8">🎉 Walang utang!</p>'}
    </div>
  `;
}

async function renderClients(root) {
  await loadClients();
  root.innerHTML = '<input id="search" type="text" placeholder="Search..." class="w-full px-4 py-3 rounded-xl border mb-3 bg-white" oninput="filterClients(this.value)" /><div id="list" class="space-y-2">' + clientListHTML(state.clients) + '</div>';
}

function clientListHTML(clients) {
  return clients.map(c => '<div class="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center"><div><div class="font-semibold">' + esc(c.name) + '</div><div class="text-xs text-gray-500">' + esc(c.phone || '') + '</div></div><div class="font-bold ' + (c.balance <= 0 ? 'text-green-600' : 'text-orange-600') + '">' + peso(c.balance) + '</div></div>').join('');
}

function filterClients(q) {
  q = q.toLowerCase();
  document.getElementById('list').innerHTML = clientListHTML(state.clients.filter(c => c.name.toLowerCase().includes(q) || (c.phone || '').includes(q)));
}

async function renderPay(root, preselectedId) {
  await loadClients();
  root.innerHTML = '<h2 class="text-xl font-bold mb-3">💵 Record Bayad</h2><div class="bg-white p-4 rounded-xl shadow-sm space-y-3"><select id="pay-client" class="w-full px-3 py-3 border rounded-lg">' +
    state.clients.map(c => '<option value="' + c.id + '" ' + (c.id === preselectedId ? 'selected' : '') + '>' + esc(c.name) + ' - ' + peso(c.balance) + '</option>').join('') +
    '</select><input id="pay-amount" type="number" step="0.01" placeholder="Amount" class="w-full px-3 py-3 border rounded-lg text-2xl font-bold text-center" />' +
    '<div class="grid grid-cols-4 gap-2"><button onclick="setAmt(100)" class="py-2 bg-gray-100 rounded-lg text-sm">+₱100</button><button onclick="setAmt(500)" class="py-2 bg-gray-100 rounded-lg text-sm">+₱500</button><button onclick="setAmt(1000)" class="py-2 bg-gray-100 rounded-lg text-sm">+₱1000</button><button onclick="setAmt(\'full\')" class="py-2 bg-blue-100 text-blue-700 rounded-lg text-sm font-semibold">Full</button></div>' +
    '<select id="pay-type" class="w-full px-3 py-3 border rounded-lg"><option>Cash</option><option>GCash</option><option>Maya</option><option>Bank Transfer</option></select>' +
    '<button onclick="submitPay()" class="w-full py-4 bg-green-500 text-white rounded-xl font-bold text-lg">✓ Record Bayad</button></div>';
}

function setAmt(val) {
  const input = document.getElementById('pay-amount');
  if (val === 'full') { const id = parseInt(document.getElementById('pay-client').value); const c = state.clients.find(x => x.id === id); input.value = c ? c.balance.toFixed(2) : ''; }
  else input.value = ((parseFloat(input.value) || 0) + val).toFixed(2);
}

async function submitPay() {
  const clientId = parseInt(document.getElementById('pay-client').value);
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const type = document.getElementById('pay-type').value;
  if (!clientId || !amount) return alert('Fill all fields');
  try {
    const r = await fetch(API + '/api/payments', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Auth-Token': getToken() }, body: JSON.stringify({ clientId, amount, type, date: new Date().toISOString().split('T')[0] }) });
    const result = await r.json();
    if (result.success) { alert('✅ Bayad recorded!'); showView('home'); }
    else alert('Error: ' + result.error);
  } catch (e) { alert('Network error'); }
}

(async () => { await loadClients(); showView('home'); })();
</script>
</body>
</html>
